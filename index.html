    // Helper: build Google Maps multi-stop route URL
    // ═══════════════════════════════════════════════════════════════
    function buildRouteUrl(stops, mode) {
      if (!stops || stops.length < 2) return null;
      const travelmode = mode || "walking";
      const enc = s => encodeURIComponent(s);
      const origin = enc(stops[0]);
      const dest   = enc(stops[stops.length - 1]);
      const waypts = stops.slice(1, -1).map(enc).join("%7C");
      let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=${travelmode}`;
      if (waypts) url += `&waypoints=${waypts}`;
      return url;
    }

    const TZ_ZONES = [
      { label:"台灣", flag:"🇹🇼", tz:"Asia/Taipei", accent:"#facc15", bg:"rgba(250,204,21,0.08)" },
      { label:"法國", flag:"🇫🇷", tz:"Europe/Paris", accent:"#a78bfa", bg:"rgba(167,139,250,0.08)" },

    ];

    function TimezoneClock() {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);

      const fmt = (date, tz) => {
        const timeStr = date.toLocaleTimeString("zh-TW", { timeZone:tz, hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false });
        const dateStr = date.toLocaleDateString("zh-TW", { timeZone:tz, month:"2-digit", day:"2-digit", weekday:"short" });
        return { time:timeStr, date:dateStr };
      };

      const twOffset = (() => {
        const t = new Date();
        const tw = new Date(t.toLocaleString("en-US", { timeZone:"Asia/Taipei" }));
        const fr = new Date(t.toLocaleString("en-US", { timeZone:"Europe/Paris" }));
        return Math.round((fr - tw) / 3600000);
      })();

      return (
        <div style={{ padding:"0 16px 2px" }}>
          <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.09)", borderRadius:18, padding:"14px 4px 10px", marginBottom:12 }}>
            <div style={{ fontSize:10, color:"#64748b", letterSpacing:4, textAlign:"center", marginBottom:10 }}>🌍 即時時區對照</div>
            <div style={{ display:"flex", gap:6, padding:"0 10px" }}>
              {TZ_ZONES.map(z => {
                const { time, date } = fmt(now, z.tz);
                return (
                  <div key={z.label} style={{ flex:1, background:z.bg, border:`1px solid ${z.accent}30`, borderRadius:13, padding:"10px 6px", textAlign:"center" }}>
                    <div style={{ fontSize:16, marginBottom:2 }}>{z.flag}</div>
                    <div style={{ fontSize:10, color:z.accent, fontWeight:700, marginBottom:4 }}>{z.label}</div>
                    <div style={{ fontSize:16, fontWeight:900, color:"#f0f0f0", fontVariantNumeric:"tabular-nums", letterSpacing:-0.5 }}>{time.slice(0,5)}</div>
                    <div style={{ fontSize:9, color:"#64748b", marginTop:2, fontVariantNumeric:"tabular-nums" }}>{time.slice(6)}<span style={{ opacity:0.5 }}>秒</span></div>
                    <div style={{ fontSize:9.5, color:"#94a3b8", marginTop:3 }}>{date}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ textAlign:"center", marginTop:8, fontSize:10, color:"#475569" }}>
              台灣比法國 / 摩納哥 {twOffset > 0 ? `快 ${twOffset} 小時（夏令時間）` : `慢 ${Math.abs(twOffset)} 小時`}
            </div>
          </div>
        </div>
      );
    }

    function useCountdown() {
      const [diff, setDiff] = useState(TRIP_START - Date.now());
      useEffect(() => { const id = setInterval(() => setDiff(TRIP_START - Date.now()), 1000); return () => clearInterval(id); }, []);
      if (diff <= 0) return null;
      return { d:Math.floor(diff/86400000), h:Math.floor((diff%86400000)/3600000), m:Math.floor((diff%3600000)/60000), s:Math.floor((diff%60000)/1000) };
    }

    function getTodayDay() {
      const now = new Date();
      for (let i = 0; i < DAYS.length; i++) {
        const d = DAYS[i];
        const [m, day] = d.date.split("/").map(Number);
        const tripDate = new Date(2026, m - 1, day);
        if (now.toDateString() === tripDate.toDateString()) return i;
      }
      return null;
    }

    const openMap = q => {
      const encoded = encodeURIComponent(q);
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const isAndroid = /Android/i.test(navigator.userAgent);
      // Universal Google Maps web URL - works on all platforms and opens app if installed
      const webUrl = `https://www.google.com/maps/search/?api=1&query=${encoded}`;
      if (isIOS) {
        // Try Google Maps app first; if not installed Safari will ignore and we fall back to web
        const appUrl = `comgooglemaps://?q=${encoded}`;
        const start = Date.now();
        window.location.href = appUrl;
        setTimeout(() => {
          // If app didn't open (page still focused = app not installed), open web
          if (Date.now() - start < 1500) {
            window.open(webUrl, "_blank");
          }
        }, 800);
      } else if (isAndroid) {
        // geo: URI triggers Android chooser (Google Maps, etc.)
        window.location.href = `geo:0,0?q=${encoded}`;
        setTimeout(() => {
          window.open(webUrl, "_blank");
        }, 800);
      } else {
        window.open(webUrl, "_blank");
      }
    };

    // ═══════════════════════════════════════════════════════════════
    function speakFrench(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "fr-FR";
      utter.rate = 0.85;
      utter.pitch = 1;
      // Try to pick a French voice if available
      const voices = window.speechSynthesis.getVoices();
      const frVoice = voices.find(v => v.lang.startsWith("fr"));
      if (frVoice) utter.voice = frVoice;
      window.speechSynthesis.speak(utter);
    }

    // ═══════════════════════════════════════════════════════════════
    // PHRASEBOOK
    // ═══════════════════════════════════════════════════════════════
    function Phrasebook() {
      const [selCat, setSelCat] = useState(0);
      const [flipped, setFlipped] = useState({});
      const [speaking, setSpeaking] = useState(null);
      const [ttsSupported, setTtsSupported] = useState(true);

      useEffect(() => {
        setTtsSupported(!!window.speechSynthesis);
        // Pre-load voices (some browsers need this)
        if (window.speechSynthesis) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
        return () => { window.speechSynthesis && window.speechSynthesis.cancel(); };
      }, []);

      function handleSpeak(e, text, key) {
        e.stopPropagation(); // Don't flip card when tapping speaker
        setSpeaking(key);
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "fr-FR";
        utter.rate = 0.82;
        utter.pitch = 1;
        const voices = window.speechSynthesis.getVoices();
        const frVoice = voices.find(v => v.lang === "fr-FR") || voices.find(v => v.lang.startsWith("fr"));
        if (frVoice) utter.voice = frVoice;
        utter.onend = () => setSpeaking(null);
        utter.onerror = () => setSpeaking(null);
        window.speechSynthesis.speak(utter);
      }

      return (
        <div style={{ padding:"16px" }}>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:4, paddingTop:4 }}>🗣️ 法語速成卡</div>
          <div style={{ fontSize:12, color:"#64748b", marginBottom:4 }}>點擊卡片翻面，按 🔊 聽真實發音</div>
          {!ttsSupported && (
            <div style={{ fontSize:11, color:"#f87171", background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.3)", borderRadius:10, padding:"6px 10px", marginBottom:8 }}>
              ⚠️ 此裝置不支援語音功能
            </div>
          )}
          <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:8, marginBottom:14, scrollbarWidth:"none" }}>
            {PHRASES.map((p,i) => (
              <button key={i} onClick={() => { setSelCat(i); setFlipped({}); window.speechSynthesis&&window.speechSynthesis.cancel(); setSpeaking(null); }} style={{
                flexShrink:0, background:selCat===i?"rgba(167,139,250,0.25)":"rgba(255,255,255,0.05)",
                border:`1px solid ${selCat===i?"rgba(167,139,250,0.5)":"rgba(255,255,255,0.1)"}`,
                borderRadius:20, padding:"5px 12px", fontSize:11,
                color:selCat===i?"#a78bfa":"#64748b", cursor:"pointer", fontWeight:selCat===i?700:400,
              }}>{p.cat}</button>
            ))}
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {PHRASES[selCat].items.map((item, i) => {
              const isFlipped = !!flipped[i];
              const key = `${selCat}-${i}`;
              const isSpeaking = speaking === key;
              return (
                <div key={i} onClick={() => setFlipped(p => ({...p, [i]:!p[i]}))} style={{
                  textAlign:"left", cursor:"pointer",
                  background:isFlipped?"rgba(167,139,250,0.12)":"rgba(255,255,255,0.04)",
                  border:`1px solid ${isSpeaking?"rgba(251,191,36,0.7)":isFlipped?"rgba(167,139,250,0.35)":"rgba(255,255,255,0.08)"}`,
                  borderRadius:16, padding:"14px 16px", transition:"all 0.2s",
                  boxShadow: isSpeaking?"0 0 12px rgba(251,191,36,0.25)":"none",
                }}>
                  <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:10 }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      {!isFlipped ? (
                        <div>
                          <div style={{ fontSize:17, fontWeight:800, color:"#f0f0f0", marginBottom:4 }}>{item.fr}</div>
                          <div style={{ fontSize:11, color:"#64748b" }}>點擊翻面看翻譯 →</div>
                        </div>
                      ) : (
                        <div>
                          <div style={{ fontSize:15, fontWeight:700, color:"#a78bfa", marginBottom:6 }}>{item.fr}</div>
                          <div style={{ fontSize:12, color:"#fbbf24", marginBottom:5, fontStyle:"italic" }}>/{item.ph}/</div>
                          <div style={{ fontSize:14, color:"#e2e8f0", fontWeight:600 }}>🇹🇼 {item.zh}</div>
                        </div>
                      )}
                    </div>
                    {ttsSupported && (
                      <button
                        onClick={e => handleSpeak(e, item.fr, key)}
                        style={{
                          flexShrink:0, width:40, height:40, borderRadius:12,
                          background:isSpeaking?"rgba(251,191,36,0.25)":"rgba(255,255,255,0.07)",
                          border:`1.5px solid ${isSpeaking?"rgba(251,191,36,0.7)":"rgba(255,255,255,0.15)"}`,
                          color:isSpeaking?"#fbbf24":"#94a3b8",
                          cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center",
                          animation: isSpeaking?"pulse 0.8s ease-in-out infinite":"none",
                          transition:"all 0.2s",
                        }}
                        title="播放法語發音"
                      >
                        {isSpeaking ? "🔊" : "🔈"}
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ textAlign:"center", marginTop:16, fontSize:12, color:"#475569" }}>
            共 {PHRASES[selCat].items.length} 個常用句子 · 按 🔈 聽法語發音
          </div>
          <style>{`@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}`}</style>
        </div>
      );
    }

    // TRAVEL DIARY
    // ═══════════════════════════════════════════════════════════════
    const MOODS = ["😄","😊","😐","😴","🤩","😋","🥵","🌧️","✨","💜"];

    function TravelDiary() {
      const [entries, setEntries] = useState(() => {
        try { const s = localStorage.getItem("icfsn_diary"); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
      });
      const [editing, setEditing] = useState(null);
      const [draft, setDraft] = useState({ mood:"😊", note:"", highlight:"" });

      function openEdit(dateIdx) {
        const key = DAYS[dateIdx].date;
        setDraft(entries[key] || { mood:"😊", note:"", highlight:"" });
        setEditing(dateIdx);
      }

      function save() {
        const key = DAYS[editing].date;
        const newEntries = { ...entries, [key]: draft };
        setEntries(newEntries);
        try { localStorage.setItem("icfsn_diary", JSON.stringify(newEntries)); } catch(e) {}
        setEditing(null);
      }

      if (editing !== null) {
        const day = DAYS[editing];
        const t = gt(day.city);
        return (
          <div style={{ padding:"16px" }}>
            <button onClick={() => setEditing(null)} style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.13)", borderRadius:10, padding:"8px 14px", color:"#94a3b8", cursor:"pointer", fontSize:13, marginBottom:14 }}>‹ 返回日記</button>
            <div style={{ background:`linear-gradient(135deg,${t.grad[0]},${t.grad[1]})`, border:`1px solid ${t.accent}40`, borderRadius:18, padding:"16px 18px", marginBottom:14 }}>
              <span style={{ fontSize:28 }}>{day.emoji}</span>
              <div style={{ fontSize:11, color:t.accent, marginTop:6, letterSpacing:2 }}>{day.date} {day.day}</div>
              <div style={{ fontSize:16, fontWeight:800, marginTop:2 }}>{day.title}</div>
            </div>
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, color:"#94a3b8", marginBottom:8 }}>今天的心情</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {MOODS.map(m => (
                  <button key={m} onClick={() => setDraft(p=>({...p,mood:m}))} style={{ fontSize:26, background:draft.mood===m?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.04)", border:`2px solid ${draft.mood===m?"rgba(255,255,255,0.4)":"transparent"}`, borderRadius:12, padding:"4px 6px", cursor:"pointer" }}>{m}</button>
                ))}
              </div>
            </div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:12, color:"#94a3b8", marginBottom:6 }}>⭐ 今日最棒的事</div>
              <input value={draft.highlight} onChange={e=>setDraft(p=>({...p,highlight:e.target.value}))} placeholder="例：在投卡德侯看到艾菲爾鐵塔閃燈秀"
                style={{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.13)", borderRadius:12, padding:"10px 13px", color:"#f0f0f0", fontSize:13, boxSizing:"border-box" }} />
            </div>
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:12, color:"#94a3b8", marginBottom:6 }}>📝 今日日記</div>
              <textarea value={draft.note} onChange={e=>setDraft(p=>({...p,note:e.target.value}))} placeholder="記錄今天的旅行回憶…" rows={5}
                style={{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.13)", borderRadius:12, padding:"10px 13px", color:"#f0f0f0", fontSize:13, resize:"vertical", boxSizing:"border-box", lineHeight:1.6 }} />
            </div>
            <button onClick={save} style={{ width:"100%", padding:"12px", background:"rgba(167,139,250,0.25)", border:"1px solid rgba(167,139,250,0.45)", borderRadius:14, color:"#a78bfa", cursor:"pointer", fontSize:14, fontWeight:700 }}>💾 儲存日記</button>
          </div>
        );
      }

      return (
        <div style={{ padding:"16px" }}>
          <div style={{ fontSize:18, fontWeight:800, marginBottom:4, paddingTop:4 }}>📓 旅遊日記</div>
          <div style={{ fontSize:12, color:"#64748b", marginBottom:14 }}>點擊每天記錄心情與回憶</div>
          {DAYS.map((day, i) => {
            const entry = entries[day.date];
            const t = gt(day.city);
            return (
              <button key={i} onClick={() => openEdit(i)} style={{
                width:"100%", textAlign:"left", cursor:"pointer",
                background:`linear-gradient(135deg,${t.grad[0]}cc,${t.grad[1]}66)`,
                border:`1px solid ${entry?"rgba(167,139,250,0.4)":t.accent+"22"}`,
                borderRadius:14, padding:"12px 14px", marginBottom:8,
                display:"flex", alignItems:"center", gap:12,
              }}>
                <div style={{ width:44, height:44, borderRadius:12, background:`${t.accent}18`, border:`1px solid ${t.accent}38`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  {entry ? <span style={{ fontSize:24 }}>{entry.mood}</span> : <span style={{ fontSize:20 }}>{day.emoji}</span>}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:11, color:t.accent, fontWeight:700, marginBottom:2 }}>{day.date} {day.day} · {day.city}</div>
                  <div style={{ fontSize:13, fontWeight:600, color:"#f0f0f0", marginBottom:entry&&entry.highlight?3:0 }}>{day.title}</div>
                  {entry&&entry.highlight && <div style={{ fontSize:11, color:"#94a3b8", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>⭐ {entry.highlight}</div>}
                  {!entry && <div style={{ fontSize:11, color:"#475569" }}>點擊記錄今天的回憶</div>}
                </div>
                {entry ? (
                  <div style={{ background:"rgba(167,139,250,0.2)", border:"1px solid rgba(167,139,250,0.35)", borderRadius:8, padding:"3px 8px", fontSize:10, color:"#a78bfa", flexShrink:0 }}>已記錄</div>
                ) : (
                  <span style={{ color:"#475569", fontSize:18 }}>+</span>
                )}
              </button>
            );
          })}
          <div style={{ textAlign:"center", marginTop:8, fontSize:12, color:"#475569" }}>
            已記錄 {Object.keys(entries).length}/{DAYS.length} 天
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MAIN APP

      const [tab, setTab] = useState("home");

              {DAYS.map((day,i)=>{
                const t=gt(day.city);
                return (
                  <button key={i} onClick={()=>setSelDay(i)} style={{ display:"flex", alignItems:"center", gap:11, width:"100%", textAlign:"left", background:`linear-gradient(135deg,${t.grad[0]}ee,${t.grad[1]}88)`, border:`1px solid ${t.accent}28`, borderRadius:16, padding:"11px 13px", marginBottom:7, cursor:"pointer" }}>
                    <div style={{ width:44, height:44, borderRadius:12, background:`${t.accent}18`, border:`1px solid ${t.accent}3a`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                      <span style={{ fontSize:22 }}>{day.emoji}</span>
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:2 }}>
                        <span style={{ fontSize:11, color:t.accent, fontWeight:700 }}>{day.date} {day.day}</span>
                        <Pill color={t.accent} style={{ fontSize:10 }}>{t.flag} {day.city}</Pill>
                        {i===todayIdx && <span style={{ background:"rgba(74,222,128,0.2)", border:"1px solid rgba(74,222,128,0.4)", borderRadius:8, padding:"1px 6px", fontSize:9, color:"#4ade80" }}>今天</span>}
                      </div>
                      <div style={{ fontSize:13, fontWeight:700, color:"#f0f0f0", lineHeight:1.3, marginBottom:3 }}>{day.title}</div>
                      <div style={{ display:"flex", gap:3, flexWrap:"wrap" }}>
                        {day.highlights.slice(0,3).map((h,j)=><span key={j} style={{ fontSize:10, color:"#94a3b8", background:"rgba(255,255,255,0.05)", borderRadius:6, padding:"1px 5px" }}>{h}</span>)}
                      </div>
                    </div>
                    <span style={{ color:"#475569", fontSize:18, flexShrink:0 }}>›</span>
                  </button>
                );
              })}
            </div>
          )}

          {/* ══════ DAY DETAIL ══════ */}
          {tab==="itinerary" && selDay!==null && (()=>{
            const day=DAYS[selDay]; const t=gt(day.city);
            return (
              <div style={{ padding:"16px 16px 8px", paddingTop:18 }}>
                <button onClick={()=>setSelDay(null)} style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, padding:"7px 13px", color:"#94a3b8", cursor:"pointer", fontSize:13, marginBottom:12 }}>‹ 返回行程</button>
                <div style={{ background:`linear-gradient(135deg,${t.grad[0]},${t.grad[1]})`, border:`1px solid ${t.accent}40`, borderRadius:20, padding:"16px 18px", marginBottom:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div>
                      <span style={{ fontSize:32 }}>{day.emoji}</span>
                      <div style={{ fontSize:11, color:t.accent, letterSpacing:2, marginTop:5, marginBottom:2 }}>{day.date} {day.day}</div>
                      <div style={{ fontSize:17, fontWeight:800, lineHeight:1.3, marginBottom:5 }}>{day.title}</div>
                      <Pill color={t.accent}>{t.flag} {day.city}</Pill>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>

                      {DAY_ROUTES[day.date] && (()=>{
                        const dr = DAY_ROUTES[day.date];
                        const enc = s => encodeURIComponent(s);
                        const homeUrl = `https://www.google.com/maps/dir/?api=1&origin=${enc(dr.home)}&destination=${enc(dr.stops[0])}&travelmode=${dr.homeMode}`;
                        const routeUrl = buildRouteUrl(dr.stops, dr.mode);
                        const openMap = url => { if(url) window.open(url, '_blank'); };
                        return (
                          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                            <button onClick={()=>openMap(homeUrl)}
                              style={{ background:`${t.accent}22`, border:`1px solid ${t.accent}55`, borderRadius:12, padding:"8px 10px", color:t.accent, fontSize:10, display:"flex", flexDirection:"column", alignItems:"center", gap:1, fontWeight:700, whiteSpace:"nowrap", cursor:"pointer" }}>
                              <span style={{ fontSize:16 }}>🏠</span>出發
                            </button>
                            <button onClick={()=>openMap(routeUrl)}
                              style={{ background:`${t.accent}22`, border:`1px solid ${t.accent}55`, borderRadius:12, padding:"8px 10px", color:t.accent, fontSize:10, display:"flex", flexDirection:"column", alignItems:"center", gap:1, fontWeight:700, whiteSpace:"nowrap", cursor:"pointer" }}>
                              <span style={{ fontSize:16 }}>{dr.mode==="transit"?"🚆":"🗺️"}</span>路線
                            </button>
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                  <div style={{ marginTop:10, background:"rgba(255,255,255,0.07)", borderRadius:9, padding:"7px 11px", fontSize:12, color:"#cbd5e1" }}>{day.weather}</div>
                </div>
                <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:8 }}>
                  {day.highlights.map((h,i)=><Pill key={i} color={t.accent}>{h}</Pill>)}
                </div>

                {day.budget&&day.budget.length>0 && (
                  <Card accent="#fbbf24" style={{ marginBottom:12 }}>
                    <SecLabel color="#fbbf24">💰 預算參考</SecLabel>
                    {day.budget.map((b,i)=>(
                      <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", borderBottom:i<day.budget.length-1?"1px solid rgba(251,191,36,0.1)":"none" }}>
                        <span style={{ fontSize:12, color:"#e2e8f0" }}>{b.item}</span>
                        <span style={{ fontSize:12, color:"#fbbf24", fontWeight:700 }}>{b.cost}</span>
                      </div>
                    ))}
                  </Card>
                )}
                <div style={{ marginBottom:12 }}>
                  <SecLabel>📅 行程時間表</SecLabel>
                  {day.schedule.map((s,i)=>(
                    <div key={i} style={{ display:"flex", gap:9, marginBottom:10, alignItems:"flex-start" }}>
                      <div style={{ minWidth:54, textAlign:"right", paddingTop:5 }}>
                        <div style={{ fontSize:10, color:t.accent, fontWeight:700 }}>{s.time}</div>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flexShrink:0 }}>
                        <div style={{ width:28, height:28, borderRadius:"50%", background:`${t.accent}1a`, border:`1.5px solid ${t.accent}48`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>{s.icon}</div>
                        {i<day.schedule.length-1 && <div style={{ width:1.5, flex:1, minHeight:12, background:`${t.accent}1a`, marginTop:2 }} />}
                      </div>
                      <div style={{ fontSize:12.5, color:"#cbd5e1", lineHeight:1.7, flex:1, paddingTop:3, whiteSpace:"pre-line" }}>{s.content}</div>
                    </div>
                  ))}
                </div>
                {day.tickets&&day.tickets.length>0 && (
                  <Card accent="#a78bfa" style={{ marginBottom:10 }}>
                    <SecLabel color="#a78bfa">🎫 使用票券</SecLabel>
                    {day.tickets.map((tk,i)=>{
                      const label = typeof tk === "string" ? tk : tk.label;
                      const url = typeof tk === "object" ? tk.url : null;
                      if (url) {
                        return (
                          <button key={i} onClick={()=>{ window.location.href=url; }} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", width:"100%", textAlign:"left", fontSize:12, color:"#c4b5fd", marginBottom:6, padding:"8px 10px", background:"rgba(167,139,250,0.12)", border:"1px solid rgba(167,139,250,0.35)", borderRadius:10, cursor:"pointer" }}>
                            <span style={{ flex:1, lineHeight:1.5 }}>{label}</span>
                            <span style={{ fontSize:11, color:"#a78bfa", marginLeft:8, flexShrink:0 }}>開啟 →</span>
                          </button>
                        );
                      }
                      return (
                        <div key={i} style={{ fontSize:12, color:"#c4b5fd", marginBottom:4, paddingLeft:9, borderLeft:"2px solid rgba(167,139,250,0.38)", lineHeight:1.5, padding:"4px 0 4px 9px" }}>{label}</div>
                      );
                    })}
                    <a href="https://drive.google.com/drive/folders/1rrZpOtOaQJNnG6eHRZMhieoaVz3Dz-Bz?usp=sharing" target="_blank" rel="noopener noreferrer"
                      style={{ display:"flex", alignItems:"center", gap:8, marginTop:8, padding:"9px 12px", background:"rgba(34,197,94,0.10)", border:"1px solid rgba(34,197,94,0.35)", borderRadius:10, textDecoration:"none" }}>
                      <span style={{ fontSize:16 }}>📁</span>
                      <span style={{ flex:1, fontSize:12, color:"#86efac", fontWeight:700 }}>開啟所有票券（Google Drive）</span>
                      <span style={{ fontSize:11, color:"#4ade80", flexShrink:0 }}>開啟 →</span>
                    </a>
                  </Card>
                )}
                {day.tips && (
                  <div style={{ background:"rgba(251,191,36,0.07)", border:"1px solid rgba(251,191,36,0.23)", borderRadius:13, padding:13, marginBottom:12 }}>
                    <div style={{ fontSize:11, color:"#fbbf24", marginBottom:5 }}>💡 小提醒</div>
                    <div style={{ fontSize:12.5, color:"#fde68a", lineHeight:1.75, whiteSpace:"pre-line" }}>{day.tips}</div>
                  </div>
                )}
                <div style={{ display:"flex", gap:7 }}>
                  {selDay>0 && <button onClick={()=>setSelDay(selDay-1)} style={{ flex:1, padding:"9px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.09)", borderRadius:11, color:"#94a3b8", cursor:"pointer", fontSize:12 }}>‹ {DAYS[selDay-1].date} {DAYS[selDay-1].emoji}</button>}
                  {selDay<DAYS.length-1 && <button onClick={()=>setSelDay(selDay+1)} style={{ flex:1, padding:"9px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.09)", borderRadius:11, color:"#94a3b8", cursor:"pointer", fontSize:12, textAlign:"right" }}>{DAYS[selDay+1].date} {DAYS[selDay+1].emoji} ›</button>}
                </div>
              </div>
            );
          })()}

          {tab==="spots" && <CitySpots />}
          {tab==="phrase" && <Phrasebook />}
          {tab==="diary" && <TravelDiary />}

          {/* ══════ CHECKLIST ══════ */}
          {tab==="checklist" && (
            <div style={{ padding:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5, paddingTop:6 }}>
                <div style={{ fontSize:18, fontWeight:800 }}>☑️ 行前清單</div>
                <Pill color={pct===100?"#4ade80":"#fbbf24"} style={{ fontSize:12, fontWeight:700 }}>{pct}%</Pill>
              </div>
              <div style={{ background:"rgba(255,255,255,0.09)", borderRadius:10, height:5, overflow:"hidden", marginBottom:14 }}>
                <div style={{ height:"100%", borderRadius:10, transition:"width 0.3s", background:pct===100?"linear-gradient(90deg,#4ade80,#22d3ee)":"linear-gradient(90deg,#a78bfa,#60a5fa)", width:`${pct}%` }} />
              </div>
              {CHECKLIST.map((cat,ci) => {
                const catDone=cat.items.filter(it=>checked[`${cat.cat}|${it}`]).length;
                return (
                  <div key={ci} style={{ marginBottom:13 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:"#a78bfa" }}>{cat.cat}</span>
                      <span style={{ fontSize:11, color:"#64748b" }}>{catDone}/{cat.items.length}</span>
                    </div>
                    <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:13, overflow:"hidden" }}>
                      {cat.items.map((item,ii)=>{
                        const done=!!checked[`${cat.cat}|${item}`];
                        return (
                          <button key={ii} onClick={()=>toggle(cat.cat,item)} style={{ display:"flex", alignItems:"center", gap:9, width:"100%", textAlign:"left", padding:"10px 13px", background:done?"rgba(74,222,128,0.08)":"none", border:"none", borderTop:ii>0?"1px solid rgba(255,255,255,0.05)":"none", cursor:"pointer" }}>
                            <div style={{ width:21, height:21, borderRadius:6, flexShrink:0, border:done?"none":"2px solid rgba(255,255,255,0.2)", background:done?"#4ade80":"transparent", display:"flex", alignItems:"center", justifyContent:"center" }}>
                              {done && <span style={{ fontSize:12, color:"#052e16", fontWeight:800 }}>✓</span>}
                            </div>
                            <span style={{ fontSize:13, color:done?"#86efac":"#e2e8f0", textDecoration:done?"line-through":"none", opacity:done?0.65:1, lineHeight:1.4 }}>{item}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              {pct===100 && (
                <div style={{ textAlign:"center", padding:"20px 14px", background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.28)", borderRadius:16, marginTop:4 }}>
                  <div style={{ fontSize:34, marginBottom:6 }}>🎉</div>
                  <div style={{ fontSize:15, fontWeight:800, color:"#4ade80" }}>全部打包完成！</div>
                  <div style={{ fontSize:12, color:"#86efac", marginTop:4 }}>出發吧！法國等著你！🇫🇷</div>
                </div>
              )}
            </div>
          )}

          {/* ══════ BOTTOM NAV ══════ */}
          <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, WebkitBackdropFilter:"blur(20px)", background:"rgba(7,5,18,0.97)", backdropFilter:"blur(20px)", borderTop:"1px solid rgba(255,255,255,0.07)", display:"flex" }}>
            {TABS.map(t=>(
              <button key={t.id} onClick={() => { setTab(t.id); if(t.id!=="itinerary") setSelDay(null); }}
                style={{ flex:1, padding:"9px 2px 7px", background:"none", border:"none", borderTop:tab===t.id?"2px solid #a78bfa":"2px solid transparent", color:tab===t.id?"#a78bfa":"#475569", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:1, fontSize:"8.5px" }}>
                <span style={{ fontSize:17 }}>{t.icon}</span>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>


  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
